<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albuquerque Isotopes Logo History</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../triple-a-style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header class="sticky-header">
    <a href="../../triple-a.html" class="back-btn">← Back to Triple-A</a>
    <h1 class="text-isotopes"> Albuquerque Isotopes</h1>
</header>

    <div class="category-header">Primary Logos</div>
    <div id="primary-logos" class="grid"></div>

    <div class="category-header">Alternate Logos</div>
    <div id="alternate-logos" class="grid"></div>

    <div class="category-header">Hat Logos</div>
    <div id="hat-logos" class="grid"></div>

    <div class="category-header">Jersey Logos</div>
    <div id="jersey-logos" class="grid"></div>

    <div class="category-header">Patches</div>
    <div id="patches" class="grid"></div>

    <div class="category-header">Theme Night Logos</div>
    <div id="theme-night"></div>
    
    <div class="category-header">Copa de la Diversión Logos</div>
    <div id="copa"></div>

    <div class="category-header">Batting Practice</div>
    <div id="batting-practice" class="grid"></div>

    <div class="category-header">Other</div>
    <div id="other-logos" class="grid"></div>
    
    <script>
        const path = "../../images/triple-a-teams/albuquerque-isotopes/";
        const allFiles = [
"Mariachis de Nuevo México copa jersey logo 2018-present.png",
"Affiliate purple hat logo 2015-present.png",
"Affiliate purple jersey logo 2015-present.png",
"Alternate logo 2003-present.png",
"Black hat logo 2003-present.png",
"Black jersey logo 2003-present.png",
"Duke City hat logo 2025-present.png",
"Duke City jersey logo 2025-present.png",
"Duke City sleeve patch 2025-present.png",
"Dukes theme night hat logo 2012-present.png",
"Dukes theme night jersey logo 2012-present.png",
"Dukes theme night sleeve patch 2012-present.png",
"Green Chile Cheeseburgers theme night hat logo 2017-2025.png",
"Green Chile Cheeseburgers theme night hat logo 2026-present.png",
"Green Chile Cheeseburgers theme night jersey logo 2017-2025.png",
"Green Chile Cheeseburgers theme night jersey logo 2026-present.png",
"Green Chile Cheeseburgers theme night sleeve patch 2026-present.png",
"Home white jersey logo 2003-present.png",
"Mariachis de Nuevo México copa black hat logo 2018-present.png",
"Mariachis de Nuevo México copa green hat logo 2025-present.png",
"Mariachis de Nuevo México copa green jersey logo 2025-present.png",
"Mariachis de Nuevo México copa green sleeve patch 2025-present.png",
"Mariachis de Nuevo México copa sleeve patch 2018-present.png",
"Mariachis de Nuevo México copa white panel hat logo 2018-present.png",
"Primary logo 2003-present.png",
"Red hat logo 2015-present.png",
"Red jersey logo 2015-present.png",
"Road gray jersey logo 2003-present.png",];

allFiles.sort((a, b) => {
    const getSortData = (file) => {
        const lower = file.toLowerCase();
        
        // Identity Extraction (for grouping Dukes together, Isotopes together, etc.)
        let identity = "";
        if (lower.includes("theme night")) identity = lower.split("theme night")[0].trim();
        else if (lower.includes("copa")) identity = lower.split("copa")[0].trim();

        // Year Extraction (Start Year)
        const yearMatch = file.match(/\d{4}/);
        const startYear = yearMatch ? parseInt(yearMatch[0]) : 0;
        
        // Active/Present Priority (Forces 'present' to the bottom of the group)
        const activePriority = lower.includes("present") ? 1 : 0;
        
        // Type Order (Hat -> Jersey -> Patch)
        let typePriority = 99; 
        if (lower.includes("hat")) typePriority = 1;
        else if (lower.includes("jersey")) typePriority = 2;
        else if (lower.includes("patch") || lower.includes("sleeve")) typePriority = 3;

        return { identity, activePriority, startYear, typePriority };
    };

    const A = getSortData(a);
    const B = getSortData(b);

    // SORTING HIERARCHY:
    // 1. Group by Identity Name (Alphabetical: Dukes, then Green Chile...)
    // 2. Group by Active status (0 for past years, 1 for 'present')
    // 3. Group by Start Year (2017 before 2018)
    // 4. Group by Type (Hat, Jersey, Patch)
    return A.identity.localeCompare(B.identity) || 
           A.activePriority - B.activePriority || 
           A.startYear - B.startYear || 
           A.typePriority - B.typePriority;
});

const printedIdentities = new Set();

allFiles.forEach(fileName => {
    const lowerName = fileName.toLowerCase();
    const datePattern = /\d{4}(?:-\d{4}|-present)?/g;
    const yearMatch = fileName.match(datePattern);
    const yearText = yearMatch ? yearMatch[0] : "";

    // 1. Identification
    let identity = "";
    if (lowerName.includes("theme night")) identity = fileName.split(/theme night/i)[0].trim();
    else if (lowerName.includes("copa")) identity = fileName.split(/copa/i)[0].trim();

    // 2. Card Caption Cleaning
    // Removes the year and the category keyword, but keeps the identity name
    let cardCaption = fileName
        .replace('.png', '')
        .replace(yearText, '')
        .replace(/theme night|copa/gi, '')
        .replace(/\s+/g, ' ') // Fix extra spaces
        .trim();

    const cardHtml = `
        <div class="logo-card" onclick="openLightbox('${path}${fileName}')">
        <div class="logo-image-wrapper">
            <img src="${path}${fileName}" alt="${fileName}" loading="lazy">
        </div>
        <div class="logo-caption">
            <div class="logo-name">${cardCaption}</div>
        </div>
    </div>`;

    // 3. Sorting & Row Generation
    if (lowerName.includes("theme night") || lowerName.includes("copa")) {
        const targetId = lowerName.includes("theme night") ? 'theme-night' : 'copa';
        const container = document.getElementById(targetId);
        const groupKey = `${identity}-${yearText}`.replace(/\s+/g, '-');

        // Identity Header
       if (!printedIdentities.has(identity)) {
    printedIdentities.add(identity);
    // MUST match the class in your CSS file
    
    container.innerHTML += `
    <h3 class="identity-header">${identity}</h3>`;
}

        // Year Row Grid
        if (!document.getElementById(`grid-${groupKey}`)) {
            container.innerHTML += `
                <div class="year-row-label">${yearText}</div>
                <div id="grid-${groupKey}" class="grid"></div>`;
        }
        document.getElementById(`grid-${groupKey}`).innerHTML += cardHtml;
    } else {
        // Your existing standard sorting for Primary, Alternate, etc.
        if (lowerName.includes("primary logo")) document.getElementById('primary-logos').innerHTML += cardHtml;
        else if (lowerName.includes("alternate")) document.getElementById('alternate-logos').innerHTML += cardHtml;
        else if (lowerName.includes("hat")) document.getElementById('hat-logos').innerHTML += cardHtml;
        else if (lowerName.includes("jersey")) document.getElementById('jersey-logos').innerHTML += cardHtml;
        else if (lowerName.includes("patch")) document.getElementById('patches').innerHTML += cardHtml;
        else document.getElementById('other-logos').innerHTML += cardHtml;
    }
});

function openLightbox(imgSrc) {
    document.getElementById('lightbox-img').src = imgSrc;
    document.getElementById('lightbox').style.display = 'flex';
}
</script>
  
  <div id="lightbox" class="lightbox" onclick="this.style.display='none'">
    <span class="close-btn">&times;</span>
    <img id="lightbox-img" src="" alt="Enlarged Logo">
    <div id="lightbox-caption"></div>
</div>

</body>
</html>
