<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

        <button class="filter-btn text-storm-chasers" onclick="loadRoster('storm-chasers')">Omaha Storm Chasers</button>

        <button class="filter-btn text-red-wings" onclick="loadRoster('red-wings')">Rochester Red Wings</button>

    <div class="roster-container">
    <h2 id="team-title">Roster</h2>
    <div class="active-count-pill">
        Active: <span id="active-count">0</span>
    </div>
</div>

        <table class="roster-table" id="main-roster-table">
            <thead>
                <tr id="table-header-row">
                    <th>No.</th>
                    <th>Pos.</th>
                    <th>Name</th>
                    <th>B/T</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="roster-body"></tbody>
        </table>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</body>
<script src="tracker-logic.js"></script>
</html>
