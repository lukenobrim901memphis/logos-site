<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke's Logos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="sticky-header">
        <h1>Luke's Logos</h1>
    </header>

    <main class="home-container">
        <div class="logo-grid">

    <a href="mlb.html" class="logo-card">
        <div class="logo-image-wrapper">
            <img src="images/league-logos/mlb-main.png" alt="MLB Logo">
        </div>
        <div class="logo-caption">
            <div class="logo-name">Major League Baseball</div>
        </div>
    </a>

    <a href="nba.html" class="logo-card">
        <div class="logo-image-wrapper">
            <img src="images/league-logos/nba-main.png" alt="NBA Logo">
        </div>
        <div class="logo-caption">
            <div class="logo-name">National Basketball Association</div>
        </div>
    </a>

    <a href="nfl.html" class="logo-card">
        <div class="logo-image-wrapper">
            <img src="images/league-logos/nfl-main.png" alt="NFL Logo">
        </div>
        <div class="logo-caption">
            <div class="logo-name">National Football League</div>
        </div>
    </a>

    <a href="triple-a.html" class="logo-card">
        <div class="logo-image-wrapper">
            <img src="images/league-logos/triple-a-main.png" alt="Triple-A Logo">
        </div>
        <div class="logo-caption">
            <div class="logo-name">Triple A</div>
        </div>
    </a>

    <a href="lidom.html" class="logo-card">
        <div class="logo-image-wrapper">
            <img src="images/league-logos/lidom-main.png" alt="LIDOM Logo">
        </div>
        <div class="logo-caption">
            <div class="logo-name">LIDOM</div>
        </div>
    </a>

    <a href="lmb.html" class="logo-card">
        <div class="logo-image-wrapper">
            <img src="images/league-logos/lmb-main.png" alt="LMB Logo">
        </div>
        <div class="logo-caption">
            <div class="logo-name">Mexican League</div>
        </div>
    </a>

    <a href="wbc.html" class="logo-card">
        <div class="logo-image-wrapper">
            <img src="images/league-logos/wbc-main.png" alt="WBC Logo">
        </div>
        <div class="logo-caption">
            <div class="logo-name">World Baseball Classic</div>
        </div>
    </a>
</div>
    </main>
</body>
</html>
